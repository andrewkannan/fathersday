<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval Queue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <div id="login-container">
        <div class="glass-panel">
            <h2>Admin Login</h2>
            <input type="password" id="admin-password" placeholder="Enter password" />
            <button id="login-btn">Login</button>
            <p id="login-error" style="color: #ff4d4d; margin-top: 10px; display: none;">Invalid password</p>
        </div>
    </div>

    <div id="dashboard-container" style="display: none;">
        <header>
            <h1>Approval Queue</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <div class="tabs">
            <button id="tab-pending" class="tab-btn active">Pending Wishes</button>
            <button id="tab-approved" class="tab-btn">Approved Wishes</button>
        </div>

        <div id="wishes-grid">
            <!-- Wishes will be injected here -->
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin.js"></script>
</body>
</html>
