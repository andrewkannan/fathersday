<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessed Father's Day Wishes</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Background stars for floating space aesthetic -->
    <div class="star shape-1"></div>
    <div class="star shape-2"></div>
    <div class="star shape-3"></div>

    <!-- Container for dynamic floating wishes -->
    <div id="wishes-container"></div>

    <!-- QR Code Container (Left Side) -->
    <div class="qr-container">
        <div id="qrcode"></div>
        <p>Scan to send<br>a wish!</p>
    </div>

    <!-- Central Input Form (Glassmorphism) -->
    <div class="center-content">
        <div class="glass-panel">
            <h1>Blessed Father's Day</h1>
            <p>A Father’s Love Leads Generations</p>
            <form id="wish-form">
                <input type="text" id="wish-input" autocomplete="off" placeholder="Write your wish..." required maxlength="70" />
                <div class="action-buttons">
                    <label for="wish-image" class="image-upload-btn">📷 Add Photo</label>
                    <input type="file" id="wish-image" accept="image/*" style="display: none;" />
                    <button type="submit">✨ Send Wish</button>
                </div>
                <div id="image-preview-text"></div>
            </form>
            <p class="powered-by">powered by ccc bilingual</p>
        </div>
    </div>

    <!-- Socket.io client library -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- QRCode library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
